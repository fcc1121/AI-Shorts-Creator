name: Run AI Shorts Creator

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "YouTube 视频 ID"
        required: true
        default: "dQw4w9WgXcQ"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt update && sudo apt install -y ffmpeg

      - name: Configure API Key and Video ID
        run: |
          sed -i "s/openai.api_key = \"\"/openai.api_key = \"${{ secrets.OPENAI_API_KEY }}\"/" autocropper.py
          sed -i "s/video_id = \"\"/video_id = \"${{ github.event.inputs.video_id }}\"/" autocropper.py

      - name: Run the script
        run: |
          python autocropper.py

      - name: Upload output video
        uses: actions/upload-artifact@v4
        with:
          name: output-video
          path: output.mp4
